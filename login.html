<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('img/h.jpeg') no-repeat center center;
            background-size: cover;
            opacity: 0.1;
            z-index: -1;
        }

        .form {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .form h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
            font-weight: 600;
        }

        .form .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .form label {
            position: absolute;
            top: 50%;
            left: 16px;
            transform: translateY(-50%);
            color: #666;
            transition: 0.3s;
            pointer-events: none;
            font-size: 16px;
            background: transparent;
        }

        .form input {
            width: 100%;
            padding: 16px 16px 16px 16px;
            border-radius: 10px;
            border: 2px solid #e1e5e9;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            background: #f8f9fa;
        }

        .form input:focus {
            border-color: #3498db;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .form input:focus + label,
        .form input:not(:placeholder-shown) + label {
            top: -10px;
            left: 12px;
            font-size: 12px;
            color: #3498db;
            background: #fff;
            padding: 0 8px;
        }

        .form input::placeholder {
            color: #aaa;
        }

        .form button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
        }

        .form button:active {
            transform: translateY(0);
        }

        .form .forgot-password {
            text-align: center;
            margin-top: 20px;
        }

        .form .forgot-password a {
            color: #3498db;
            text-decoration: none;
            font-size: 14px;
        }

        .form .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .form .back-link a {
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
        }

        .form .back-link a:hover {
            color: #3498db;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .form {
                padding: 30px 20px;
                margin: 20px;
                max-width: none;
            }

            .form h2 {
                font-size: 24px;
                margin-bottom: 25px;
            }

            .form input {
                font-size: 16px; /* Prevents zoom on iOS */
            }

            .form button {
                padding: 14px;
                font-size: 16px;
            }
        }
    </style>

</head>

<body>
    <form action="t.php" class="form" method="post">
        <h2>Login</h2>
        <div class="input-group">
            <input id="name" name="username" type="text" placeholder=" " required>
            <label for="name">Username</label>
        </div>
        <div class="input-group">
            <input id="password" name="password" type="password" placeholder=" " required>
            <label for="password">Password</label>
        </div>
        <div class="input-group">
            <input id="email" name="email" type="email" placeholder=" " required>
            <label for="email">Email</label>
        </div>
        <button type="submit">Submit</button>
        <div class="forgot-password">
            <a href="#">Forgot Password?</a>
        </div>
        <div class="back-link">
            <a href="t.html">← Back to Portfolio</a>
        </div>
    </form>

</html>
